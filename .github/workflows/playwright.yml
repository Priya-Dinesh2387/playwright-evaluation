name: Playwright Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------------- Assignment 1 ----------------
      - name: Install Assignment1 dependencies
        run: |
          cd Assignment1
          npm install

      - name: Install Playwright browsers (Assignment1)
        run: |
          cd Assignment1
          npx playwright install --with-deps

      - name: Run Assignment1 tests
        run: |
          cd Assignment1
          npm run regression

      # ---------------- Assignment 2 ----------------
      - name: Install Assignment2 dependencies
        run: |
          cd Assignment2
          npm install

      - name: Install Playwright browsers (Assignment2)
        run: |
          cd Assignment2
          npx playwright install --with-deps

      - name: Run Assignment2 tests
        run: |
          cd Assignment2
          npm run regression

      # ---------------- Reports ----------------
      - name: Upload Assignment1 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: assignment1-report
          path: Assignment1/playwright-report

      - name: Upload Assignment2 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: assignment2-report
          path: Assignment2/playwright-report